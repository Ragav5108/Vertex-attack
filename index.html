<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toon Vertex: Online Multiplayer</title>
    <!-- PeerJS for Real Online Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF8E1;
            --ink-color: #2c3e50;
            --btn-color: #FFB74D;
            --btn-shadow: #E65100;
            --online-color: #6C5CE7;
            --online-shadow: #4834d4;
            --success-color: #00b894;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d7ccc8 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            overflow: hidden;
            color: var(--ink-color);
            user-select: none;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .screen.active { display: flex; }

        .card {
            background: white;
            border: 4px solid var(--ink-color);
            border-radius: 20px;
            box-shadow: 8px 8px 0px var(--ink-color);
            padding: 25px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
        }

        h1 { font-size: 2.5rem; margin: 0 0 10px 0; text-transform: uppercase; color: var(--ink-color); }
        
        .input-group {
            margin: 15px 0;
            display: flex;
            gap: 5px;
        }
        
        input {
            flex: 1;
            padding: 10px;
            border: 3px solid var(--ink-color);
            border-radius: 10px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            outline: none;
        }

        .currency-display {
            background: #FFE66D;
            border: 3px solid var(--ink-color);
            border-radius: 50px;
            padding: 5px 15px;
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 3px 3px 0px var(--ink-color);
        }

        .cartoon-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 3px solid var(--ink-color);
            border-radius: 15px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--btn-color);
            color: white;
            box-shadow: 5px 5px 0px var(--ink-color);
            transition: transform 0.1s;
        }

        .cartoon-btn:active { transform: translate(2px, 2px); box-shadow: 3px 3px 0px var(--ink-color); }
        .cartoon-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }
        
        .btn-online { background: var(--online-color); box-shadow: 5px 5px 0px var(--online-shadow); }
        .btn-secondary { background: #A5D6A7; }
        .btn-shop { background: #90CAF9; }
        .btn-copy { background: var(--success-color); width: auto; padding: 0 20px; }

        .game-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px;
            align-items: center;
        }

        .status-text { font-size: 1.3rem; font-weight: 600; text-align: center; flex-grow: 1; }
        .connection-status { font-size: 0.8rem; color: #666; margin-top: 5px; }

        .game-container {
            position: relative;
            width: 300px;
            height: 300px;
            background: white;
            border: 4px solid var(--ink-color);
            border-radius: 10px;
            box-shadow: 8px 8px 0px var(--ink-color);
        }

        .grid-lines {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            pointer-events: none;
        }
        .cell { border: 4px solid var(--ink-color); border-radius: 2px; }
        .cell:nth-child(1) { border-top: 4px solid var(--ink-color); border-left: 4px solid var(--ink-color); border-right: 2px solid var(--ink-color); border-bottom: 2px solid var(--ink-color); }
        .cell:nth-child(2) { border-top: 4px solid var(--ink-color); border-right: 4px solid var(--ink-color); border-left: 2px solid var(--ink-color); border-bottom: 2px solid var(--ink-color); }
        .cell:nth-child(3) { border-bottom: 4px solid var(--ink-color); border-left: 4px solid var(--ink-color); border-right: 2px solid var(--ink-color); border-top: 2px solid var(--ink-color); }
        .cell:nth-child(4) { border-bottom: 4px solid var(--ink-color); border-right: 4px solid var(--ink-color); border-left: 2px solid var(--ink-color); border-top: 2px solid var(--ink-color); }

        .vertex {
            position: absolute; width: 50px; height: 50px;
            transform: translate(-50%, -50%);
            border-radius: 50%; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            background: transparent; 
        }
        .v0 { top: 0%; left: 0%; } .v1 { top: 0%; left: 50%; } .v2 { top: 0%; left: 100%; }
        .v3 { top: 50%; left: 0%; } .v4 { top: 50%; left: 50%; } .v5 { top: 50%; left: 100%; }
        .v6 { top: 100%; left: 0%; } .v7 { top: 100%; left: 50%; } .v8 { top: 100%; left: 100%; }

        .coin {
            width: 60%; height: 60%; border-radius: 50%;
            border: 3px solid var(--ink-color);
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .coin::after {
            content: ''; position: absolute; top: 20%; left: 20%;
            width: 30%; height: 30%; background: rgba(255,255,255,0.4); border-radius: 50%;
        }
        .vertex.selected .coin { transform: scale(1.3) rotate(-10deg); box-shadow: 5px 5px 0px var(--ink-color); z-index: 20; }
        .vertex.valid-move { background-color: rgba(165, 214, 167, 0.5); border-radius: 50%; }
        .vertex.valid-move::before { content: '↗'; font-size: 24px; color: var(--ink-color); font-weight: bold; }

        .shop-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin-top: 15px; max-height: 300px; overflow-y: auto; padding: 5px;
        }
        .shop-item {
            background: #f9f9f9; border: 3px solid var(--ink-color);
            border-radius: 10px; padding: 10px; cursor: pointer;
            position: relative; transition: transform 0.1s;
        }
        .shop-item:active { transform: scale(0.95); }
        .shop-item.owned { background: #e8f5e9; }
        .shop-item.equipped { border-color: #FFE66D; box-shadow: 0 0 10px #FFE66D; }
        .shop-preview { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--ink-color); margin: 0 auto 5px auto; display: block; }
        .shop-price { font-size: 0.8rem; font-weight: bold; }
        .shop-status { font-size: 0.7rem; position: absolute; top: 2px; right: 5px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.8);
            justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .room-id-box {
            background: #eee;
            padding: 10px;
            border: 2px dashed var(--ink-color);
            border-radius: 10px;
            font-family: monospace;
            font-size: 1.2rem;
            margin: 10px 0;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen active">
        <div class="card">
            <h1>Vertex<br>Attack</h1>
            <div class="currency-display">💰 <span id="home-coins">0</span></div>
            
            <button class="cartoon-btn btn-online" onclick="showLobby()">🌍 Play Online</button>
            <button class="cartoon-btn" onclick="startGame('pvp')">2 Players (Local)</button>
            <button class="cartoon-btn btn-shop" onclick="openShop()">🛒 Coin Shop</button>
        </div>
    </div>

    <!-- LOBBY SCREEN (ONLINE) -->
    <div id="lobby-screen" class="screen">
        <div class="card">
            <h2>Online Lobby</h2>
            <p>Connect with a friend on another device!</p>
            
            <div style="margin: 20px 0; border-bottom: 2px solid #eee;"></div>
            
            <h3>1. Create Room</h3>
            <button class="cartoon-btn btn-online" id="btn-create" onclick="createRoom()">Create Room</button>
            <div id="create-result" style="display:none; margin-top:10px;">
                <p>Share this ID with your friend:</p>
                <div class="room-id-box" id="my-room-id">...</div>
                <button class="cartoon-btn btn-copy" onclick="copyRoomId()">Copy ID</button>
                <p class="connection-status" id="host-status">Waiting for player...</p>
            </div>

            <div style="margin: 20px 0; border-bottom: 2px solid #eee;"></div>

            <h3>2. Join Room</h3>
            <div class="input-group">
                <input type="text" id="join-id-input" placeholder="Paste Room ID here">
                <button class="cartoon-btn btn-online" style="width: auto;" onclick="joinRoom()">Join</button>
            </div>
            <p class="connection-status" id="join-status"></p>

            <button class="cartoon-btn btn-secondary" style="margin-top:20px;" onclick="goHome()">Back</button>
        </div>
    </div>

    <!-- SHOP SCREEN -->
    <div id="shop-screen" class="screen">
        <div class="card">
            <h2>Coin Shop</h2>
            <div class="currency-display">💰 <span id="shop-coins">0</span></div>
            <div class="shop-grid" id="shop-container"></div>
            <button class="cartoon-btn btn-secondary" style="margin-top:20px;" onclick="closeShop()">Back</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <button class="cartoon-btn" style="width: auto; padding: 5px 15px; font-size: 0.9rem;" onclick="goHome()">Exit</button>
            <div class="status-text" id="status-text">Player 1</div>
            <div style="width: 60px;"></div>
        </div>

        <div class="game-container">
            <div class="grid-lines">
                <div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div>
            </div>
            <div id="board-layer"></div>
        </div>
        <div id="online-indicator" style="margin-top:10px; font-size:0.8rem; color:#666; display:none;">
            🟢 Connected to Opponent
        </div>
    </div>

    <!-- GAME OVER MODAL -->
    <div class="modal" id="game-over-modal">
        <div class="card modal-content">
            <h2 id="winner-text">Player 1 Wins!</h2>
            <p style="font-size: 1.2rem;" id="reward-text"></p>
            <button class="cartoon-btn" onclick="restartGame()">Play Again</button>
            <button class="cartoon-btn btn-secondary" onclick="goHome()">Exit to Menu</button>
        </div>
    </div>

<script>
    // --- CONFIG & DATA ---
    const WIN_CONDITIONS = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], // Horizontal
        [0, 3, 6], [1, 4, 7], [2, 5, 8]  // Vertical
    ];

    const ADJACENCY = {
        0: [1, 3], 1: [0, 2, 4], 2: [1, 5],
        3: [0, 4, 6], 4: [1, 3, 5, 7], 5: [2, 4, 8],
        6: [3, 7], 7: [4, 6, 8], 8: [5, 7]
    };

    const COIN_SKINS = [
        { id: 'default_red', name: 'Classic Red', color: '#FF6B6B', price: 0 },
        { id: 'default_blue', name: 'Classic Blue', color: '#4ECDC4', price: 0 },
        { id: 'gold', name: 'Gold Coin', color: '#FFD700', price: 100 },
        { id: 'silver', name: 'Silver', color: '#BDC3C7', price: 50 },
        { id: 'purple', name: 'Magic Purple', color: '#9B59B6', price: 150 },
        { id: 'green', name: 'Slime Green', color: '#2ECC71', price: 75 },
        { id: 'orange', name: 'Pumpkin', color: '#E67E22', price: 60 },
        { id: 'black', name: 'Ink Black', color: '#2c3e50', price: 200 },
        { id: 'pink', name: 'Cotton Candy', color: '#FF9FF3', price: 120 }
    ];

    // --- STATE ---
    let board = Array(9).fill(null);
    let currentPlayer = 'p1';
    let gameMode = 'pvp'; // pvp, online
    let phase = 'placing'; 
    let coinsPlaced = { p1: 0, p2: 0 };
    let selectedVertex = null;
    let isGameActive = false;
    let myPlayerId = 'p1'; // In online mode, am I p1 or p2?
    
    // PeerJS Variables
    let peer = null;
    let conn = null;
    let myRoomId = null;

    let userCoins = 0;
    let ownedSkins = ['default_red', 'default_blue'];
    let equippedSkinP1 = 'default_red';
    let equippedSkinP2 = 'default_blue';

    // --- DOM ELEMENTS ---
    const homeScreen = document.getElementById('home-screen');
    const lobbyScreen = document.getElementById('lobby-screen');
    const shopScreen = document.getElementById('shop-screen');
    const gameScreen = document.getElementById('game-screen');
    const boardLayer = document.getElementById('board-layer');
    const statusText = document.getElementById('status-text');
    const modal = document.getElementById('game-over-modal');
    const winnerText = document.getElementById('winner-text');
    const rewardText = document.getElementById('reward-text');
    const onlineIndicator = document.getElementById('online-indicator');
    const homeCoinsEl = document.getElementById('home-coins');
    const shopCoinsEl = document.getElementById('shop-coins');
    const shopContainer = document.getElementById('shop-container');

    // --- INITIALIZATION ---
    function loadProgress() {
        const saved = localStorage.getItem('vertexQuestSave');
        if (saved) {
            const data = JSON.parse(saved);
            userCoins = data.coins || 0;
            ownedSkins = data.owned || ['default_red', 'default_blue'];
            equippedSkinP1 = data.eqP1 || 'default_red';
            equippedSkinP2 = data.eqP2 || 'default_blue';
        }
        updateCurrencyUI();
    }

    function saveProgress() {
        const data = {
            coins: userCoins,
            owned: ownedSkins,
            eqP1: equippedSkinP1,
            eqP2: equippedSkinP2
        };
        localStorage.setItem('vertexQuestSave', JSON.stringify(data));
        updateCurrencyUI();
    }

    function updateCurrencyUI() {
        homeCoinsEl.innerText = userCoins;
        shopCoinsEl.innerText = userCoins;
    }

    function initBoard() {
        boardLayer.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const vertex = document.createElement('div');
            vertex.classList.add('vertex', `v${i}`);
            vertex.dataset.index = i;
            vertex.onclick = () => handleVertexClick(i);
            boardLayer.appendChild(vertex);
        }
    }

    // --- NAVIGATION ---
    function showLobby() {
        homeScreen.classList.remove('active');
        lobbyScreen.classList.add('active');
        // Reset UI
        document.getElementById('create-result').style.display = 'none';
        document.getElementById('join-status').innerText = '';
        document.getElementById('host-status').innerText = 'Waiting for player...';
        document.getElementById('join-id-input').value = '';
    }

    function goHome() {
        if (conn) conn.close();
        if (peer) peer.destroy();
        conn = null;
        peer = null;
        
        modal.style.display = 'none';
        gameScreen.classList.remove('active');
        shopScreen.classList.remove('active');
        lobbyScreen.classList.remove('active');
        homeScreen.classList.add('active');
        isGameActive = false;
        updateCurrencyUI();
    }

    function openShop() {
        homeScreen.classList.remove('active');
        shopScreen.classList.add('active');
        renderShop();
    }

    function closeShop() {
        shopScreen.classList.remove('active');
        homeScreen.classList.add('active');
    }

    function restartGame() {
        modal.style.display = 'none';
        resetGame();
        // If online, tell opponent to restart
        if (gameMode === 'online' && conn && conn.open) {
            conn.send({ type: 'restart' });
        }
    }

    // --- ONLINE LOGIC (PeerJS) ---
    function createRoom() {
        const btn = document.getElementById('btn-create');
        btn.disabled = true;
        btn.innerText = "Creating...";

        // Create a new Peer (Host)
        peer = new Peer(null, {
            debug: 2
        });

        peer.on('open', (id) => {
            myRoomId = id;
            document.getElementById('create-result').style.display = 'block';
            document.getElementById('my-room-id').innerText = id;
            btn.disabled = false;
            btn.innerText = "Create Room";
        });

        peer.on('connection', (c) => {
            // Player 2 joined
            conn = c;
            setupConnection('p1'); // Host is always P1
            document.getElementById('host-status').innerText = "Player Connected! Starting...";
            document.getElementById('host-status').style.color = "green";
            
            setTimeout(() => {
                startGame('online');
            }, 1000);
        });

        peer.on('error', (err) => {
            alert("Error creating room: " + err.type);
            btn.disabled = false;
            btn.innerText = "Create Room";
        });
    }

    function joinRoom() {
        const id = document.getElementById('join-id-input').value.trim();
        const status = document.getElementById('join-status');
        
        if (!id) {
            status.innerText = "Please enter a Room ID";
            return;
        }

        status.innerText = "Connecting...";
        
        // Create a new Peer (Client) and connect to Host
        peer = new Peer(null, {
            debug: 2
        });

        peer.on('open', () => {
            conn = peer.connect(id);
            
            conn.on('open', () => {
                setupConnection('p2'); // Client is always P2
                status.innerText = "Connected! Starting...";
                status.style.color = "green";
                setTimeout(() => {
                    startGame('online');
                }, 1000);
            });

            conn.on('error', (err) => {
                status.innerText = "Connection Failed. Check ID.";
                status.style.color = "red";
            });
        });
        
        peer.on('error', (err) => {
            status.innerText = "Network Error.";
            status.style.color = "red";
        });
    }

    function setupConnection(myRole) {
        myPlayerId = myRole;
        onlineIndicator.style.display = 'block';
        
        // Handle incoming data
        conn.on('data', (data) => {
            handleNetworkData(data);
        });

        conn.on('close', () => {
            alert("Opponent disconnected!");
            goHome();
        });
    }

    function copyRoomId() {
        navigator.clipboard.writeText(myRoomId).then(() => {
            alert("Room ID copied to clipboard!");
        });
    }

    function handleNetworkData(data) {
        if (data.type === 'move') {
            // Opponent made a move
            if (data.phase === 'placing') {
                board[data.index] = 'p2'; // Opponent is always p2 from my perspective? 
                // Wait, if I am p1, opponent is p2. If I am p2, opponent is p1.
                // Let's standardize: Data always sends 'player' role.
                
                // Actually, simpler: Host is P1, Client is P2.
                // If I am Host (P1), incoming move is P2.
                // If I am Client (P2), incoming move is P1.
                
                const opponentRole = myPlayerId === 'p1' ? 'p2' : 'p1';
                board[data.index] = opponentRole;
                coinsPlaced[opponentRole]++;
                
                if (coinsPlaced.p1 === 3 && coinsPlaced.p2 === 3) phase = 'moving';
                
                renderBoard();
                if (checkWin(opponentRole)) {
                    endGame(opponentRole);
                } else {
                    currentPlayer = myPlayerId; // My turn
                    updateStatus();
                }
            } else if (data.phase === 'moving') {
                const opponentRole = myPlayerId === 'p1' ? 'p2' : 'p1';
                board[data.to] = opponentRole;
                board[data.from] = null;
                
                renderBoard();
                if (checkWin(opponentRole)) {
                    endGame(opponentRole);
                } else {
                    currentPlayer = myPlayerId;
                    updateStatus();
                }
            }
        } else if (data.type === 'restart') {
            resetGame();
        }
    }

    function sendMove(data) {
        if (conn && conn.open) {
            conn.send(data);
        }
    }

    // --- GAME LOGIC ---
    function startGame(mode) {
        gameMode = mode;
        lobbyScreen.classList.remove('active');
        homeScreen.classList.remove('active');
        shopScreen.classList.remove('active');
        gameScreen.classList.add('active');
        resetGame();
    }

    function resetGame() {
        board = Array(9).fill(null);
        currentPlayer = 'p1';
        phase = 'placing';
        coinsPlaced = { p1: 0, p2: 0 };
        selectedVertex = null;
        isGameActive = true;
        
        document.querySelectorAll('.vertex').forEach(v => {
            v.innerHTML = '';
            v.classList.remove('selected', 'valid-move');
        });
        
        updateStatus();
    }

    function handleVertexClick(index) {
        if (!isGameActive) return;
        
        // In online mode, only allow clicks if it's my turn
        if (gameMode === 'online' && currentPlayer !== myPlayerId) return;
        // In local mode, always allow
        if (gameMode === 'pvp' && currentPlayer !== 'p1' && currentPlayer !== 'p2') return; // Safety

        if (phase === 'placing') {
            handlePlacement(index);
        } else if (phase === 'moving') {
            handleMovement(index);
        }
    }

    function handlePlacement(index) {
        if (board[index] !== null) return;

        // Update Local State
        board[index] = currentPlayer;
        coinsPlaced[currentPlayer]++;
        renderBoard();

        // Send to Network if Online
        if (gameMode === 'online') {
            sendMove({ type: 'move', phase: 'placing', index: index });
        }

        if (checkWin(currentPlayer)) {
            endGame(currentPlayer);
            return;
        }

        if (coinsPlaced.p1 === 3 && coinsPlaced.p2 === 3) {
            phase = 'moving';
            statusText.innerText = "Move Time!";
            setTimeout(() => updateStatus(), 1000);
        }

        switchTurn();
    }

    function handleMovement(index) {
        if (selectedVertex === null) {
            if (board[index] === currentPlayer) {
                selectedVertex = index;
                renderBoard();
                highlightValidMoves(index);
            }
            return;
        }

        if (selectedVertex === index) {
            selectedVertex = null;
            renderBoard();
            return;
        }

        if (board[index] === null && isAdjacent(selectedVertex, index)) {
            // Update Local State
            const from = selectedVertex;
            board[index] = currentPlayer;
            board[selectedVertex] = null;
            selectedVertex = null;
            renderBoard();

            // Send to Network if Online
            if (gameMode === 'online') {
                sendMove({ type: 'move', phase: 'moving', from: from, to: index });
            }

            if (checkWin(currentPlayer)) {
                endGame(currentPlayer);
            } else {
                switchTurn();
            }
        }
    }

    function isAdjacent(from, to) {
        return ADJACENCY[from].includes(to);
    }

    function highlightValidMoves(fromIndex) {
        document.querySelectorAll('.vertex').forEach(v => v.classList.remove('valid-move'));
        const neighbors = ADJACENCY[fromIndex];
        neighbors.forEach(nei => {
            if (board[nei] === null) {
                const el = document.querySelector(`.v${nei}`);
                if(el) el.classList.add('valid-move');
            }
        });
    }

    function switchTurn() {
        currentPlayer = currentPlayer === 'p1' ? 'p2' : 'p1';
        updateStatus();
    }

    function updateStatus() {
        if (!isGameActive) return;
        
        let displayName = "";
        let isMyTurn = false;

        if (gameMode === 'online') {
            if (currentPlayer === myPlayerId) {
                displayName = "Your Turn";
                isMyTurn = true;
                statusText.style.color = getSkinColor(myPlayerId);
            } else {
                displayName = "Opponent's Turn";
                isMyTurn = false;
                statusText.style.color = "#666";
            }
        } else {
            // Local PVP
            displayName = currentPlayer === 'p1' ? "Player 1" : "Player 2";
            statusText.style.color = getSkinColor(currentPlayer);
        }

        const action = phase === 'placing' ? "Place Coin" : "Move Coin";
        statusText.innerText = `${displayName} (${action})`;
        
        // Disable clicks if not my turn in online mode
        const boardLayer = document.getElementById('board-layer');
        if (gameMode === 'online' && !isMyTurn) {
            boardLayer.style.pointerEvents = 'none';
            boardLayer.style.opacity = '0.7';
        } else {
            boardLayer.style.pointerEvents = 'auto';
            boardLayer.style.opacity = '1';
        }
    }

    function getSkinColor(player) {
        const skinId = player === 'p1' ? equippedSkinP1 : equippedSkinP2;
        const skin = COIN_SKINS.find(s => s.id === skinId);
        return skin ? skin.color : '#333';
    }

    function renderBoard() {
        for (let i = 0; i < 9; i++) {
            const el = document.querySelector(`.v${i}`);
            el.innerHTML = '';
            el.classList.remove('selected');

            if (board[i]) {
                const coin = document.createElement('div');
                coin.classList.add('coin');
                coin.style.backgroundColor = getSkinColor(board[i]);
                el.appendChild(coin);
            }

            if (selectedVertex === i) {
                el.classList.add('selected');
            }
        }
    }

    function checkWin(player, currentBoard = board) {
        return WIN_CONDITIONS.some(condition => {
            return condition.every(index => currentBoard[index] === player);
        });
    }

    function endGame(winner) {
        isGameActive = false;
        
        let winText = "";
        let reward = "";

        if (gameMode === 'online') {
            if (winner === myPlayerId) {
                winText = "You Won!";
                userCoins += 50;
                saveProgress();
                reward = "+50 Coins 💰";
            } else {
                winText = "Opponent Won!";
                reward = "Better luck next time!";
            }
        } else {
            winText = (winner === 'p1' ? "Player 1" : "Player 2") + " Wins!";
            reward = "";
        }

        winnerText.innerText = winText;
        rewardText.innerText = reward;
        winnerText.style.color = getSkinColor(winner);
        modal.style.display = 'flex';
    }

    // --- SHOP LOGIC ---
    function renderShop() {
        shopContainer.innerHTML = '';
        COIN_SKINS.forEach(skin => {
            const isOwned = ownedSkins.includes(skin.id);
            const isEquippedP1 = equippedSkinP1 === skin.id;
            const isEquippedP2 = equippedSkinP2 === skin.id;
            
            const item = document.createElement('div');
            item.classList.add('shop-item');
            if (isOwned) item.classList.add('owned');
            if (isEquippedP1 || isEquippedP2) item.classList.add('equipped');

            let statusText = '';
            if (isEquippedP1 && isEquippedP2) statusText = 'Both';
            else if (isEquippedP1) statusText = 'P1';
            else if (isEquippedP2) statusText = 'P2';

            item.innerHTML = `
                <div class="shop-status">${statusText}</div>
                <div class="shop-preview" style="background:${skin.color}"></div>
                <div style="font-weight:bold; font-size:0.9rem;">${skin.name}</div>
                <div class="shop-price">${isOwned ? 'Owned' : skin.price + ' 💰'}</div>
            `;

            item.onclick = () => handleShopClick(skin);
            shopContainer.appendChild(item);
        });
    }

    function handleShopClick(skin) {
        if (ownedSkins.includes(skin.id)) {
            if (equippedSkinP1 === skin.id && equippedSkinP2 === skin.id) {
                equippedSkinP1 = 'default_red';
                equippedSkinP2 = 'default_blue';
            } else if (equippedSkinP1 === skin.id) {
                equippedSkinP2 = skin.id;
            } else {
                equippedSkinP1 = skin.id;
            }
        } else {
            if (userCoins >= skin.price) {
                userCoins -= skin.price;
                ownedSkins.push(skin.id);
                equippedSkinP1 = skin.id;
            } else {
                alert("Not enough coins!");
                return;
            }
        }
        saveProgress();
        renderShop();
    }

    // Start
    loadProgress();
    initBoard();

</script>
</body>
</html>
