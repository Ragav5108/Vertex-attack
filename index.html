<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toon Vertex Strategy</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF8E1;
            --ink-color: #2c3e50;
            --btn-color: #FFB74D;
            --btn-shadow: #E65100;
            --p1-default: #FF6B6B;
            --p2-default: #4ECDC4;
            --highlight: #FFE66D;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d7ccc8 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            overflow: hidden;
            color: var(--ink-color);
            user-select: none;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .screen.active { display: flex; }

        .card {
            background: white;
            border: 4px solid var(--ink-color);
            border-radius: 20px;
            box-shadow: 8px 8px 0px var(--ink-color);
            padding: 25px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            color: var(--ink-color);
        }

        .currency-display {
            background: var(--highlight);
            border: 3px solid var(--ink-color);
            border-radius: 50px;
            padding: 5px 15px;
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 3px 3px 0px var(--ink-color);
        }

        .cartoon-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 3px solid var(--ink-color);
            border-radius: 15px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--btn-color);
            color: white;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2);
            box-shadow: 5px 5px 0px var(--ink-color);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .cartoon-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0px var(--ink-color);
        }

        .btn-secondary { background: #A5D6A7; }
        .btn-shop { background: #90CAF9; }

        .game-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px;
            align-items: center;
        }

        .status-text {
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            flex-grow: 1;
        }

        .game-container {
            position: relative;
            width: 300px;
            height: 300px;
            background: white;
            border: 4px solid var(--ink-color);
            border-radius: 10px;
            box-shadow: 8px 8px 0px var(--ink-color);
        }

        .grid-lines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            pointer-events: none;
        }
        .cell { border: 4px solid var(--ink-color); border-radius: 2px; }
        .cell:nth-child(1) { border-top: 4px solid var(--ink-color); border-left: 4px solid var(--ink-color); border-right: 2px solid var(--ink-color); border-bottom: 2px solid var(--ink-color); }
        .cell:nth-child(2) { border-top: 4px solid var(--ink-color); border-right: 4px solid var(--ink-color); border-left: 2px solid var(--ink-color); border-bottom: 2px solid var(--ink-color); }
        .cell:nth-child(3) { border-bottom: 4px solid var(--ink-color); border-left: 4px solid var(--ink-color); border-right: 2px solid var(--ink-color); border-top: 2px solid var(--ink-color); }
        .cell:nth-child(4) { border-bottom: 4px solid var(--ink-color); border-right: 4px solid var(--ink-color); border-left: 2px solid var(--ink-color); border-top: 2px solid var(--ink-color); }

        .vertex {
            position: absolute;
            width: 50px;
            height: 50px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent; 
        }
        
        .v0 { top: 0%; left: 0%; } .v1 { top: 0%; left: 50%; } .v2 { top: 0%; left: 100%; }
        .v3 { top: 50%; left: 0%; } .v4 { top: 50%; left: 50%; } .v5 { top: 50%; left: 100%; }
        .v6 { top: 100%; left: 0%; } .v7 { top: 100%; left: 50%; } .v8 { top: 100%; left: 100%; }

        .coin {
            width: 60%;
            height: 60%;
            border-radius: 50%;
            border: 3px solid var(--ink-color);
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        
        .coin::after {
            content: '';
            position: absolute;
            top: 20%; left: 20%;
            width: 30%; height: 30%;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
        }

        .vertex.selected .coin {
            transform: scale(1.3) rotate(-10deg);
            box-shadow: 5px 5px 0px var(--ink-color);
            z-index: 20;
        }

        .vertex.valid-move {
            background-color: rgba(165, 214, 167, 0.5);
            border-radius: 50%;
        }
        .vertex.valid-move::before {
            content: '↗';
            font-size: 24px;
            color: var(--ink-color);
            font-weight: bold;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }

        .shop-item {
            background: #f9f9f9;
            border: 3px solid var(--ink-color);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
        }
        .shop-item:active { transform: scale(0.95); }
        .shop-item.owned { background: #e8f5e9; }
        .shop-item.equipped { border-color: var(--highlight); box-shadow: 0 0 10px var(--highlight); }
        
        .shop-preview {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 2px solid var(--ink-color);
            margin: 0 auto 5px auto;
            display: block;
        }
        .shop-price { font-size: 0.8rem; font-weight: bold; }
        .shop-status { font-size: 0.7rem; position: absolute; top: 2px; right: 5px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen active">
        <div class="card">
            <h1>Vertex<br>Attack</h1>
            <div class="currency-display">💰 <span id="home-coins">0</span></div>
            
            <button class="cartoon-btn" onclick="startGame('pvp')">2 Players</button>
            <button class="cartoon-btn" onclick="startGame('ai')">vs Computer </button>
            <button class="cartoon-btn btn-shop" onclick="openShop()">🛒 Coin Shop</button>
        </div>
    </div>

    <!-- SHOP SCREEN -->
    <div id="shop-screen" class="screen">
        <div class="card">
            <h2>Coin Shop</h2>
            <div class="currency-display">💰 <span id="shop-coins">0</span></div>
            <div class="shop-grid" id="shop-container"></div>
            <button class="cartoon-btn btn-secondary" style="margin-top:20px;" onclick="closeShop()">Back</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <button class="cartoon-btn" style="width: auto; padding: 5px 15px; font-size: 0.9rem;" onclick="goHome()">Exit</button>
            <div class="status-text" id="status-text">Player 1</div>
            <div style="width: 60px;"></div>
        </div>

        <div class="game-container">
            <div class="grid-lines">
                <div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div>
            </div>
            <div id="board-layer"></div>
        </div>
    </div>

    <!-- GAME OVER MODAL -->
    <div class="modal" id="game-over-modal">
        <div class="card modal-content">
            <h2 id="winner-text">Player 1 Wins!</h2>
            <p style="font-size: 1.2rem;" id="reward-text"></p>
            <button class="cartoon-btn" onclick="restartGame()">Play Again</button>
            <button class="cartoon-btn btn-secondary" onclick="goHome()">Exit to Menu</button>
        </div>
    </div>

<script>
    // --- CONFIG & DATA ---
    const WIN_CONDITIONS = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], // Horizontal
        [0, 3, 6], [1, 4, 7], [2, 5, 8]  // Vertical
    ];

    const ADJACENCY = {
        0: [1, 3], 1: [0, 2, 4], 2: [1, 5],
        3: [0, 4, 6], 4: [1, 3, 5, 7], 5: [2, 4, 8],
        6: [3, 7], 7: [4, 6, 8], 8: [5, 7]
    };

    const COIN_SKINS = [
        { id: 'default_red', name: 'Classic Red', color: '#FF6B6B', price: 0 },
        { id: 'default_blue', name: 'Classic Blue', color: '#4ECDC4', price: 0 },
        { id: 'gold', name: 'Gold Coin', color: '#FFD700', price: 100 },
        { id: 'silver', name: 'Silver', color: '#BDC3C7', price: 50 },
        { id: 'purple', name: 'Magic Purple', color: '#9B59B6', price: 150 },
        { id: 'green', name: 'Slime Green', color: '#2ECC71', price: 75 },
        { id: 'orange', name: 'Pumpkin', color: '#E67E22', price: 60 },
        { id: 'black', name: 'Ink Black', color: '#2c3e50', price: 200 },
        { id: 'pink', name: 'Cotton Candy', color: '#FF9FF3', price: 120 }
    ];

    // --- STATE ---
    let board = Array(9).fill(null);
    let currentPlayer = 'p1';
    let gameMode = 'pvp'; 
    let phase = 'placing'; 
    let coinsPlaced = { p1: 0, p2: 0 };
    let selectedVertex = null;
    let isGameActive = false;
    
    let userCoins = 0;
    let ownedSkins = ['default_red', 'default_blue'];
    let equippedSkinP1 = 'default_red';
    let equippedSkinP2 = 'default_blue';

    // --- DOM ELEMENTS ---
    const homeScreen = document.getElementById('home-screen');
    const shopScreen = document.getElementById('shop-screen');
    const gameScreen = document.getElementById('game-screen');
    const boardLayer = document.getElementById('board-layer');
    const statusText = document.getElementById('status-text');
    const modal = document.getElementById('game-over-modal');
    const winnerText = document.getElementById('winner-text');
    const rewardText = document.getElementById('reward-text');
    const homeCoinsEl = document.getElementById('home-coins');
    const shopCoinsEl = document.getElementById('shop-coins');
    const shopContainer = document.getElementById('shop-container');

    // --- INITIALIZATION ---
    function loadProgress() {
        const saved = localStorage.getItem('vertexQuestSave');
        if (saved) {
            const data = JSON.parse(saved);
            userCoins = data.coins || 0;
            ownedSkins = data.owned || ['default_red', 'default_blue'];
            equippedSkinP1 = data.eqP1 || 'default_red';
            equippedSkinP2 = data.eqP2 || 'default_blue';
        }
        updateCurrencyUI();
    }

    function saveProgress() {
        const data = {
            coins: userCoins,
            owned: ownedSkins,
            eqP1: equippedSkinP1,
            eqP2: equippedSkinP2
        };
        localStorage.setItem('vertexQuestSave', JSON.stringify(data));
        updateCurrencyUI();
    }

    function updateCurrencyUI() {
        homeCoinsEl.innerText = userCoins;
        shopCoinsEl.innerText = userCoins;
    }

    function initBoard() {
        boardLayer.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const vertex = document.createElement('div');
            vertex.classList.add('vertex', `v${i}`);
            vertex.dataset.index = i;
            vertex.onclick = () => handleVertexClick(i);
            boardLayer.appendChild(vertex);
        }
    }

    // --- NAVIGATION ---
    function startGame(mode) {
        gameMode = mode;
        homeScreen.classList.remove('active');
        shopScreen.classList.remove('active');
        gameScreen.classList.add('active');
        resetGame();
    }

    function goHome() {
        modal.style.display = 'none';
        gameScreen.classList.remove('active');
        shopScreen.classList.remove('active');
        homeScreen.classList.add('active');
        isGameActive = false;
        updateCurrencyUI();
    }

    function openShop() {
        homeScreen.classList.remove('active');
        shopScreen.classList.add('active');
        renderShop();
    }

    function closeShop() {
        shopScreen.classList.remove('active');
        homeScreen.classList.add('active');
    }

    function restartGame() {
        modal.style.display = 'none';
        resetGame();
    }

    // --- GAME LOGIC ---
    function resetGame() {
        board = Array(9).fill(null);
        currentPlayer = 'p1';
        phase = 'placing';
        coinsPlaced = { p1: 0, p2: 0 };
        selectedVertex = null;
        isGameActive = true;
        
        document.querySelectorAll('.vertex').forEach(v => {
            v.innerHTML = '';
            v.classList.remove('selected', 'valid-move');
        });
        
        updateStatus();
    }

    function handleVertexClick(index) {
        if (!isGameActive) return;
        if (gameMode === 'ai' && currentPlayer === 'p2') return;

        if (phase === 'placing') {
            handlePlacement(index);
        } else if (phase === 'moving') {
            handleMovement(index);
        }
    }

    function handlePlacement(index) {
        if (board[index] !== null) return;

        board[index] = currentPlayer;
        coinsPlaced[currentPlayer]++;
        renderBoard();

        if (checkWin(currentPlayer)) {
            endGame(currentPlayer);
            return;
        }

        if (coinsPlaced.p1 === 3 && coinsPlaced.p2 === 3) {
            phase = 'moving';
            statusText.innerText = "Move Time!";
            setTimeout(() => updateStatus(), 1000);
        }

        switchTurn();
    }

    function handleMovement(index) {
        if (selectedVertex === null) {
            if (board[index] === currentPlayer) {
                selectedVertex = index;
                renderBoard();
                highlightValidMoves(index);
            }
            return;
        }

        if (selectedVertex === index) {
            selectedVertex = null;
            renderBoard();
            return;
        }

        if (board[index] === null && isAdjacent(selectedVertex, index)) {
            board[index] = currentPlayer;
            board[selectedVertex] = null;
            selectedVertex = null;
            renderBoard();

            if (checkWin(currentPlayer)) {
                endGame(currentPlayer);
            } else {
                switchTurn();
            }
        }
    }

    function isAdjacent(from, to) {
        return ADJACENCY[from].includes(to);
    }

    function highlightValidMoves(fromIndex) {
        document.querySelectorAll('.vertex').forEach(v => v.classList.remove('valid-move'));
        const neighbors = ADJACENCY[fromIndex];
        neighbors.forEach(nei => {
            if (board[nei] === null) {
                const el = document.querySelector(`.v${nei}`);
                if(el) el.classList.add('valid-move');
            }
        });
    }

    function switchTurn() {
        currentPlayer = currentPlayer === 'p1' ? 'p2' : 'p1';
        updateStatus();

        if (gameMode === 'ai' && currentPlayer === 'p2' && isGameActive) {
            // Small delay for realism, then call Hard AI
            setTimeout(aiMoveHard, 500);
        }
    }

    function updateStatus() {
        if (!isGameActive) return;
        const isP1 = currentPlayer === 'p1';
        const name = isP1 ? "Player 1" : (gameMode === 'ai' ? "Computer" : "Player 2");
        const action = phase === 'placing' ? "Place Coin" : "Move Coin";
        statusText.innerText = `${name}: ${action}`;
        
        const skinId = isP1 ? equippedSkinP1 : equippedSkinP2;
        const skin = COIN_SKINS.find(s => s.id === skinId);
        statusText.style.color = skin ? skin.color : '#333';
    }

    function getSkinColor(player) {
        const skinId = player === 'p1' ? equippedSkinP1 : equippedSkinP2;
        const skin = COIN_SKINS.find(s => s.id === skinId);
        return skin ? skin.color : '#333';
    }

    function renderBoard() {
        for (let i = 0; i < 9; i++) {
            const el = document.querySelector(`.v${i}`);
            el.innerHTML = '';
            el.classList.remove('selected');

            if (board[i]) {
                const coin = document.createElement('div');
                coin.classList.add('coin');
                coin.style.backgroundColor = getSkinColor(board[i]);
                el.appendChild(coin);
            }

            if (selectedVertex === i) {
                el.classList.add('selected');
            }
        }
    }

    function checkWin(player, currentBoard = board) {
        return WIN_CONDITIONS.some(condition => {
            return condition.every(index => currentBoard[index] === player);
        });
    }

    function endGame(winner) {
        isGameActive = false;
        const isP1 = winner === 'p1';
        const winnerName = isP1 ? "Player 1" : (gameMode === 'ai' ? "Computer" : "Player 2");
        
        if (gameMode === 'ai' && isP1) {
            userCoins += 50;
            saveProgress();
            winnerText.innerText = `You Won! (+50💰)`;
            rewardText.innerText = "Great job beating the AI!";
        } else if (gameMode === 'pvp') {
            winnerText.innerText = `${winnerName} Wins!`;
            rewardText.innerText = "";
        } else {
            winnerText.innerText = "Computer Wins!";
            rewardText.innerText = "Better luck next time!";
        }

        winnerText.style.color = getSkinColor(winner);
        modal.style.display = 'flex';
    }

    // --- SHOP LOGIC ---
    function renderShop() {
        shopContainer.innerHTML = '';
        COIN_SKINS.forEach(skin => {
            const isOwned = ownedSkins.includes(skin.id);
            const isEquippedP1 = equippedSkinP1 === skin.id;
            const isEquippedP2 = equippedSkinP2 === skin.id;
            
            const item = document.createElement('div');
            item.classList.add('shop-item');
            if (isOwned) item.classList.add('owned');
            if (isEquippedP1 || isEquippedP2) item.classList.add('equipped');

            let statusText = '';
            if (isEquippedP1 && isEquippedP2) statusText = 'Both';
            else if (isEquippedP1) statusText = 'P1';
            else if (isEquippedP2) statusText = 'P2';

            item.innerHTML = `
                <div class="shop-status">${statusText}</div>
                <div class="shop-preview" style="background:${skin.color}"></div>
                <div style="font-weight:bold; font-size:0.9rem;">${skin.name}</div>
                <div class="shop-price">${isOwned ? 'Owned' : skin.price + ' 💰'}</div>
            `;

            item.onclick = () => handleShopClick(skin);
            shopContainer.appendChild(item);
        });
    }

    function handleShopClick(skin) {
        if (ownedSkins.includes(skin.id)) {
            if (equippedSkinP1 === skin.id && equippedSkinP2 === skin.id) {
                equippedSkinP1 = 'default_red';
                equippedSkinP2 = 'default_blue';
            } else if (equippedSkinP1 === skin.id) {
                equippedSkinP2 = skin.id;
            } else {
                equippedSkinP1 = skin.id;
            }
        } else {
            if (userCoins >= skin.price) {
                userCoins -= skin.price;
                ownedSkins.push(skin.id);
                equippedSkinP1 = skin.id;
            } else {
                alert("Not enough coins!");
                return;
            }
        }
        saveProgress();
        renderShop();
    }

    // --- HARD AI (MINIMAX) ---
    
    function aiMoveHard() {
        if (!isGameActive) return;

        // Clone state for simulation
        const state = {
            board: [...board],
            phase: phase,
            coinsPlaced: { ...coinsPlaced },
            turn: 'p2' // AI is always p2 in this call
        };

        // Get all possible moves for the current state
        const moves = getValidMoves(state);
        
        if (moves.length === 0) return;

        let bestMove = null;
        let bestScore = -Infinity;

        // Evaluate each move using Minimax
        for (let move of moves) {
            // Apply move to a temporary state
            const nextState = applyMove(state, move);
            
            // Call Minimax (depth limited to prevent infinite loops in movement phase if needed, 
            // but here the board is small enough to go deep)
            const score = minimax(nextState, 0, false);
            
            if (score > bestScore) {
                bestScore = score;
                bestMove = move;
            }
        }

        // Execute the best move found
        if (bestMove) {
            if (bestMove.type === 'place') {
                handlePlacement(bestMove.index);
            } else if (bestMove.type === 'move') {
                // Simulate the move logic manually to update global state
                board[bestMove.to] = 'p2';
                board[bestMove.from] = null;
                renderBoard();
                if (checkWin('p2')) {
                    endGame('p2');
                } else {
                    switchTurn();
                }
            }
        }
    }

    function getValidMoves(state) {
        const moves = [];
        const { board, phase, coinsPlaced, turn } = state;

        if (phase === 'placing') {
            for (let i = 0; i < 9; i++) {
                if (board[i] === null) {
                    moves.push({ type: 'place', index: i });
                }
            }
        } else if (phase === 'moving') {
            for (let i = 0; i < 9; i++) {
                if (board[i] === turn) {
                    const neighbors = ADJACENCY[i];
                    for (let neighbor of neighbors) {
                        if (board[neighbor] === null) {
                            moves.push({ type: 'move', from: i, to: neighbor });
                        }
                    }
                }
            }
        }
        return moves;
    }

    function applyMove(state, move) {
        const newState = {
            board: [...state.board],
            phase: state.phase,
            coinsPlaced: { ...state.coinsPlaced },
            turn: state.turn === 'p1' ? 'p2' : 'p1'
        };

        if (move.type === 'place') {
            newState.board[move.index] = state.turn;
            newState.coinsPlaced[state.turn]++;
            
            // Check phase transition
            if (newState.coinsPlaced.p1 === 3 && newState.coinsPlaced.p2 === 3) {
                newState.phase = 'moving';
            }
        } else if (move.type === 'move') {
            newState.board[move.to] = state.turn;
            newState.board[move.from] = null;
        }

        return newState;
    }

    function minimax(state, depth, isMaximizing) {
        // Terminal States
        if (checkWin('p2', state.board)) return 10 - depth; // AI Wins (prefer faster wins)
        if (checkWin('p1', state.board)) return depth - 10; // Player Wins (prefer slower losses)
        
        // Draw detection (simple cycle detection or max depth to prevent infinite recursion in movement phase)
        if (depth > 6) return 0; 

        const moves = getValidMoves(state);
        if (moves.length === 0) return 0; // No moves possible

        if (isMaximizing) {
            let bestScore = -Infinity;
            for (let move of moves) {
                const nextState = applyMove(state, move);
                const score = minimax(nextState, depth + 1, false);
                bestScore = Math.max(bestScore, score);
            }
            return bestScore;
        } else {
            let bestScore = Infinity;
            for (let move of moves) {
                const nextState = applyMove(state, move);
                const score = minimax(nextState, depth + 1, true);
                bestScore = Math.min(bestScore, score);
            }
            return bestScore;
        }
    }

    // Start
    loadProgress();
    initBoard();

</script>
